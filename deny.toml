[advisories]
version = 2
ignore = [
  # tsify-next is the maintained fork of tsify and adds Vec<T> return type support
  # that tsify 0.4 lacks. The advisory recommendation to "use tsify instead" is incorrect
  # for our use case.
  "RUSTSEC-2025-0048",
]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "Unicode-DFS-2016", "Unicode-3.0", "ISC", "BSD-2-Clause", "BSD-3-Clause", "Zlib", "MPL-2.0", "CC0-1.0", "OpenSSL"]

[bans]
multiple-versions = "warn"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
